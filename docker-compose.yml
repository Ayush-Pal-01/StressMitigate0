version: "3.9"

services:
  # ── FastAPI Backend ──
  api:
    build: .
    container_name: stressmitigate-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./models:/app/models:ro  # Mount models read-only
    restart: unless-stopped

  # ── MongoDB ──
  mongodb:
    image: mongo:7
    container_name: stressmitigate-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Redis (caching + rate limiting) ──
  redis:
    image: redis:7-alpine
    container_name: stressmitigate-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
